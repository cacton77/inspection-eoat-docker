services:
  app:
    container_name: ${CONTAINER_NAME:-ros2-docker-template}
    image: ${CONTAINER_NAME:-ros2-docker-template}:${ROS_DISTRO:-humble}
    platform: linux/arm64  # Raspberry Pi
    # platform: linux/amd64  # Uncomment for x86_64
    build:
      context: .
      dockerfile: docker/Dockerfile.${ROS_DISTRO:-humble}
      args:
        # BASE_IMAGE: osrf/ros:${ROS_DISTRO}-desktop-full  # x86_64 only
        # BASE_IMAGE: dustynv/ros:${ROS_DISTRO}-ros-base-l4t-r36.3.0  # NVIDIA Jetson (ARM64)
        BASE_IMAGE: ros:${ROS_DISTRO:-humble}  # Multi-architecture (ARM64/x86_64)
        ROS_DISTRO: ${ROS_DISTRO:-humble}
        USERNAME: ${USERNAME:-macs}
        UID: ${UID:-1000}
        GID: ${UID:-1000}
        VIDEO_GID: 44
        DIALOUT_GID: 20
    stdin_open: true
    tty: true
    network_mode: host
    ipc: host
    privileged: true
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - XAUTHORITY=/tmp/.docker.xauth
      - XDG_RUNTIME_DIR=/tmp/runtime-${USERNAME:-macs}
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}
      - CYCLONEDDS_URI=${CYCLONEDDS_URI:-/config/cyclonedds.xml}
      # FastDDS reads the legacy var on Humble, the new one on Jazzy. Set both.
      - FASTRTPS_DEFAULT_PROFILES_FILE=${FASTRTPS_DEFAULT_PROFILES_FILE:-/config/fastdds.xml}
      - FASTDDS_DEFAULT_PROFILES_FILE=${FASTDDS_DEFAULT_PROFILES_FILE:-/config/fastdds.xml}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /tmp/.docker.xauth:/tmp/.docker.xauth:rw
      - ./docker/entrypoint.sh:/entrypoint.sh:ro
      - ./src:/workspaces/shared_ws/src:rw
      - ./data:/data:rw
      - ./models:/models:rw
      - ./config:/config:rw
      # REMOVE /dev/dri - that's for Intel
      - /dev:/dev
      # libcamera (RPi fork) uses libudev to identify the rp1-cfe device node;
      # without the host udev database it can't enumerate Pi cameras.
      - /run/udev:/run/udev:ro
      - /tmp/runtime-${USERNAME:-macs}:/tmp/runtime-${USERNAME:-macs}:rw
    device_cgroup_rules:
      - 'c *:* rmw'
    group_add:
      - dialout
      - video
    working_dir: /workspaces/shared_ws
    user: ${UID:-1000}:${UID:-1000}
    command: ["/bin/bash"]